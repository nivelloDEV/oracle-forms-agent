name: Oracle Forms Weekly Agent

on:
  schedule:
    - cron: "0 7 * * 1"   # Varje måndag kl 07:00 UTC (= 08:00 svensk tid)
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checka ut koden
        uses: actions/checkout@v4

      - name: Sätt upp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installera beroenden
        run: pip install requests

      - name: Hämta cachade datafiler
        uses: actions/cache@v4
        with:
          path: |
            found_companies.json
            blocklist.json
          key: agent-data-${{ github.run_id }}
          restore-keys: |
            agent-data-

      - name: Kör agenten
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py

      - name: Publicera results.json till docs/
        run: cp results.json docs/results.json

      - name: Committa och pusha results.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/results.json
          git diff --staged --quiet || git commit -m "Uppdatera results.json [skip ci]"
          git push

      - name: Spara cachade datafiler
        uses: actions/cache/save@v4
        with:
          path: |
            found_companies.json
            blocklist.json
          key: agent-data-${{ github.run_id }}
